<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入註冊| URBNSTEP</title>
    
    <!--bootstrap icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0" />

</head>
<body>
    <%- include('./layout/header'); -%>

    <main>
        <div class="container">
            <div class="main-section d-flex d-mb-column spacing-l align-center">
                <div class="layout col-5 col-mb-12">
                    <img src="../assets/images/login/login.png" alt="photo" class="radius-xs d-mb-none">
                    <img src="../assets/images/login/login-sm.png" alt="photo" class="radius-xs d-none d-mb-block">
                </div>
                <div class="layout col-7 col-mb-12">
                    <div class="main-section-input">
                        <div class="main-section-input-content radius-sm">
                            <div class="main-section-info margin-bottom-xl margin-bottom-mb-l">
                                <h3 class="headings-h3 margin-bottom-xl margin-bottom-mb-l headings-mb-h4">歡迎！</h3>
                                <div class="main-section-info-toggle">
                                    <ul class="d-flex">
                                        <li>
                                            <a href="login.html" class="headings-h6 button-active">登入</a>
                                        </li>
                                        <li>
                                            <a href="sign-up.html" class="headings-h6 button-default">註冊</a>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                            <div class="main-section-method paragraph-md">
                                <ul>
                                    <li><a href="collection.html" class="main-section-method-card d-flex spacing-s margin-bottom-xs radius-xs">
                                        <img src="../assets/images/login/facebook.svg" alt="facebook">
                                        <p>Facebook 登入</p>
                                    </a></li>
                                    <li><a href="collection.html" class="main-section-method-card d-flex spacing-s margin-bottom-xs radius-xs">
                                        <img src="../assets/images/login/apple.svg" alt="apple">
                                        <p>Apple 登入</p>
                                    </a></li>
                                    <li><a href="collection.html" class="main-section-method-card d-flex spacing-s margin-bottom-xs radius-xs">
                                        <img src="../assets/images/login/google.svg" alt="google">
                                        <p>Google 登入</p>
                                    </a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <%- include('./layout/footer'); -%>
    <script type="module" src="../main.js"></script>
</body>
</html>
